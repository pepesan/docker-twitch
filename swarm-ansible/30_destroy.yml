---
# Borra los 8 contenedores LXD del laboratorio (Swarm, Portainer y balanceadores).
# community.general.lxd_container con state: absent es idempotente: si un
# nodo ya no existe (por ejemplo porque se relanza el playbook), no falla.
- name: Destruir el laboratorio
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Pedir confirmación
      ansible.builtin.pause:
        prompt: "Esto eliminará los 8 contenedores LXD y todos sus datos. Escribe 'si' para confirmar"
      register: confirm
      when: not (force | default(false) | bool)

    - name: Abortar si no se confirmó
      ansible.builtin.meta: end_play
      when:
        - not (force | default(false) | bool)
        - confirm.user_input | lower != 'si'

    - name: Eliminar cada contenedor LXD
      community.general.lxd_container:
        name: "{{ item }}"
        state: absent
        # Fuerza la parada de procesos que impidan apagar el contenedor
        # (por ejemplo, HAProxy/Keepalived en un balanceador) y concede a
        # LXD tiempo suficiente para completar la operación de borrado.
        force_stop: true
        timeout: 300
        wait_for_container: true
      loop: "{{ groups['cluster'] }}"

    - name: Borrar los tokens de unión guardados
      ansible.builtin.file:
        path: "{{ playbook_dir }}/{{ item }}"
        state: absent
      loop:
        - manager.token
        - worker.token

    - name: Destrucción completada
      ansible.builtin.debug:
        msg: "Laboratorio destruido."
