[defaults]
inventory = inventory.ini
host_key_checking = False
retry_files_enabled = False
interpreter_python = auto_silent

[ssh_connection]
# pipelining ejecuta los módulos Python sin copiarlos antes por SFTP/SCP a un
# fichero temporal en el nodo remoto: los envía directamente por el propio
# canal SSH ya abierto y los ejecuta ahí. Menos conexiones SSH por tarea =
# playbooks notablemente más rápidos contra los 6 nodos del laboratorio.
# Requiere que 'requiretty' esté desactivado en /etc/sudoers del nodo remoto
# (no es un problema aquí: nos conectamos como root, sin sudo de por medio).
pipelining = True
