---
# Borra los 6 contenedores LXD del laboratorio (cluster Swarm + portainer-server).
# community.general.lxd_container con state: absent es idempotente: si un
# nodo ya no existe (por ejemplo porque se relanza el playbook), no falla.
- name: Destruir el laboratorio
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Pedir confirmación
      ansible.builtin.pause:
        prompt: "Esto eliminará los 6 contenedores LXD y todos sus datos. Escribe 'si' para confirmar"
      register: confirm

    - name: Abortar si no se confirmó
      ansible.builtin.meta: end_play
      when: confirm.user_input | lower != 'si'

    - name: Eliminar cada contenedor LXD
      community.general.lxd_container:
        name: "{{ item }}"
        state: absent
      loop: "{{ groups['cluster'] }}"

    - name: Borrar los tokens de unión guardados
      ansible.builtin.file:
        path: "{{ playbook_dir }}/{{ item }}"
        state: absent
      loop:
        - manager.token
        - worker.token

    - name: Destrucción completada
      ansible.builtin.debug:
        msg: "Laboratorio destruido."
