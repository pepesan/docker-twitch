---
# Instala y configura HAProxy y Keepalived en los nodos balanceadores
# para proporcionar balanceo de carga redundante y de alta disponibilidad (active-passive)
# con una IP Virtual (VIP) compartida.
#
# Soporta terminación SSL/TLS en el puerto 443 con certificado autofirmado
# y redirección automática de HTTP (80) a HTTPS (443).
#
# La VIP está definida en group_vars/all.yml como 'lb_vip'.
- name: Instalar y configurar HAProxy y Keepalived en los balanceadores
  hosts: loadbalancers
  gather_facts: true
  tasks:
    - name: Parar y deshabilitar unattended-upgrades y timers de APT automáticos
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: stopped
        enabled: false
      loop:
        - unattended-upgrades
        - apt-daily.timer
        - apt-daily-upgrade.timer
      failed_when: false

    - name: Instalar HAProxy, Keepalived y psmisc
      ansible.builtin.apt:
        name:
          - haproxy
          - keepalived
          - psmisc
        state: present
        update_cache: true
        lock_timeout: 300

    - name: Crear directorio temporal para el certificado en localhost
      ansible.builtin.file:
        path: /tmp/haproxy_certs
        state: directory
        mode: '0700'
      delegate_to: localhost
      run_once: true

    - name: Generar clave privada y certificado autofirmado en localhost
      ansible.builtin.command: >
        openssl req -x509 -newkey rsa:2048 -nodes
        -keyout /tmp/haproxy_certs/haproxy.key
        -out /tmp/haproxy_certs/haproxy.crt
        -days 365
        -subj "/CN={{ lb_vip }}"
      delegate_to: localhost
      run_once: true
      args:
        creates: /tmp/haproxy_certs/haproxy.crt

    - name: Combinar certificado y clave privada en un PEM (formato HAProxy)
      ansible.builtin.shell: >
        cat /tmp/haproxy_certs/haproxy.crt /tmp/haproxy_certs/haproxy.key > /tmp/haproxy_certs/haproxy.pem
      delegate_to: localhost
      run_once: true
      args:
        creates: /tmp/haproxy_certs/haproxy.pem

    - name: Asegurar que el directorio de certificados existe en los balanceadores
      ansible.builtin.file:
        path: /etc/haproxy/certs
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Copiar el certificado PEM a los balanceadores
      ansible.builtin.copy:
        src: /tmp/haproxy_certs/haproxy.pem
        dest: /etc/haproxy/certs/haproxy.pem
        owner: root
        group: root
        mode: '0600'
      register: haproxy_certs

    - name: Crear archivo de configuración de Keepalived
      ansible.builtin.template:
        src: templates/keepalived/keepalived.conf.j2
        dest: /etc/keepalived/keepalived.conf
        owner: root
        group: root
        mode: '0644'
      register: keepalived_config

    - name: Crear archivo de configuración de HAProxy
      ansible.builtin.template:
        src: templates/haproxy/haproxy.cfg.j2
        dest: /etc/haproxy/haproxy.cfg
        owner: root
        group: root
        mode: '0644'
      register: haproxy_config

    - name: Asegurar que Keepalived esté iniciado y habilitado
      ansible.builtin.systemd:
        name: keepalived
        state: started
        enabled: true

    - name: Asegurar que HAProxy esté iniciado y habilitado
      ansible.builtin.systemd:
        name: haproxy
        state: started
        enabled: true

    - name: Reiniciar Keepalived si cambió la configuración
      ansible.builtin.systemd:
        name: keepalived
        state: restarted
      when: keepalived_config.changed

    - name: Reiniciar HAProxy si cambió la configuración o el certificado
      ansible.builtin.systemd:
        name: haproxy
        state: restarted
      when: haproxy_config.changed or haproxy_certs.changed

- name: Verificar el balanceador de carga y la VIP (HTTP/HTTPS)
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Esperar a que la VIP esté activa y respondiendo a pings
      ansible.builtin.command: ping -c 1 -W 1 {{ lb_vip }}
      register: ping_vip
      until: ping_vip.rc == 0
      retries: 15
      delay: 2
      changed_when: false

    - name: Probar redirección HTTP (80) a HTTPS (443) en la VIP
      ansible.builtin.uri:
        url: "http://{{ lb_vip }}/"
        status_code: 301
        follow_redirects: none
        timeout: 5
      register: redirect_check
      until: redirect_check.status == 301
      retries: 10
      delay: 2

    - name: Probar petición HTTPS (443) a la VIP
      ansible.builtin.uri:
        url: "https://{{ lb_vip }}/"
        status_code: 200
        validate_certs: false
        timeout: 5
      register: https_check
      until: https_check.status == 200
      retries: 10
      delay: 2

    - name: Mostrar resultado de verificación de VIP con SSL
      ansible.builtin.debug:
        msg:
          - "¡Éxito! El balanceador con terminación SSL/TLS funciona correctamente."
          - "HTTP (80) redirige a HTTPS: {{ redirect_check.status }}"
          - "HTTPS (443) responde con: {{ https_check.status }} (Server: {{ https_check.server | default('unknown') }})"
