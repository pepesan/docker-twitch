---
# Desinstala y limpia Portainer Server (nodo portainer-server).
# El Portainer Agent se desinstala antes, en el paso 18.
- name: Desinstalar Portainer Server (nodo portainer-server)
  hosts: portainer
  gather_facts: false
  tasks:
    - name: Parar y eliminar el contenedor Portainer Server
      community.docker.docker_container:
        name: portainer
        state: absent

    - name: Eliminar el volumen de datos de Portainer
      community.docker.docker_volume:
        name: portainer_data
        state: absent
