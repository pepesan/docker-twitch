# Inventario del laboratorio: mismo escenario que ../swarm/nodos.conf
# (3 managers + 2 workers + 1 nodo Portainer, fuera del cluster Swarm)
# pero gestionado con Ansible en vez de scripts sueltos.

[managers]
manager1 ansible_host=10.207.154.10 lxd_cpu=2 lxd_mem=4GB lxd_disk=40GB
manager2 ansible_host=10.207.154.11 lxd_cpu=2 lxd_mem=4GB lxd_disk=40GB
manager3 ansible_host=10.207.154.12 lxd_cpu=2 lxd_mem=4GB lxd_disk=40GB

[workers]
worker1 ansible_host=10.207.154.13 lxd_cpu=4 lxd_mem=8GB lxd_disk=80GB
worker2 ansible_host=10.207.154.14 lxd_cpu=4 lxd_mem=8GB lxd_disk=80GB

[portainer]
portainer-server ansible_host=10.207.154.15 lxd_cpu=1 lxd_mem=2GB lxd_disk=20GB

[loadbalancers]
# vip 10.207.154.20
lb1 ansible_host=10.207.154.16 lxd_cpu=1 lxd_mem=2GB lxd_disk=20GB
lb2 ansible_host=10.207.154.17 lxd_cpu=1 lxd_mem=2GB lxd_disk=20GB

# 'swarm' = nodos que se unen al cluster Swarm (managers + workers)
[swarm:children]
managers
workers

# 'cluster' = todos los nodos LXD del laboratorio, incluido portainer-server
[cluster:children]
managers
workers
portainer
loadbalancers
