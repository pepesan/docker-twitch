# Configuración del laboratorio: cluster Docker Swarm sobre contenedores LXD
# Escenario: 3 managers (quórum Raft) + 2 workers — ver docker-portainer-swarm_06.yaml

IMAGE="ubuntu-2404-ssh-template"
NETWORK="lxdbr0"

# Módulos de kernel que necesita Docker Swarm dentro de un contenedor LXD:
# ip_vs* -> el routing mesh usa IPVS (balanceo L4) para repartir tráfico entre réplicas
# ip_tables/ip6_tables/nf_nat -> reglas NAT que dockerd instala para publicar puertos
# overlay -> red overlay (VXLAN) que conecta contenedores de distintos nodos
# br_netfilter -> permite filtrar tráfico que atraviesa los bridges de Docker
KERNEL_MODULES="ip_vs,ip_vs_rr,ip_vs_wrr,ip_vs_sh,ip_tables,ip6_tables,netlink_diag,nf_nat,overlay,br_netfilter"

NODE_NAMES=(manager1 manager2 manager3 worker1 worker2)
NODE_ROLES=(manager manager manager worker worker)
NODE_IPS=(10.207.154.10 10.207.154.11 10.207.154.12 10.207.154.13 10.207.154.14)
NODE_CPU=(2 2 2 4 4)
NODE_MEM=(4GB 4GB 4GB 8GB 8GB)
NODE_DISK=(40GB 40GB 40GB 80GB 80GB)
